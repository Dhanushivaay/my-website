<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Screen Pages</title>
  <style>
    /* Reset default margins */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth; /* smooth scrolling */
    }

    /* Each page takes full viewport */
    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Image style */
    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* fills screen without stretching */
      display: block;
    }

    /* Optional: smooth scroll snapping */
    body {
      scroll-snap-type: y mandatory;
    }

    .page {
      scroll-snap-align: start;
    }

    /* Mobile adjustments */
    @media only screen and (max-width: 768px) {
      .page img {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>

  <!-- Page 1 -->
  <div class="page">
    <img src="page1.png" alt="Page 1">
  </div>

  <!-- Page 2 -->
  <div class="page">
    <img src="page2.png" alt="Page 2">
  </div>

  <!-- Page 3 -->
  <div class="page">
    <img src="page3.png" alt="Page 3">
  </div>

</body>
</html>
